    const SUPABASE_URL = 'https://ntsdwbrdxnexgjjekfqk.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50c2R3YnJkeG5leGdqamVrZnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg2MjQ0MDYsImV4cCI6MjA4NDIwMDQwNn0.5ZrQNwFD-m4Rq4lKzfhPEGbw8BXhIoYViC-nJORosyQ';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ============ УТИЛИТЫ ============
    function generateId() {
        if (crypto.randomUUID) return crypto.randomUUID();
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // Новая функция форматирования номера с датой для отображения в JSON
    function formatNumbersWithDate(numbers) {
        if (!numbers || !numbers.length) return [];
        return numbers.map(n => `${n.value}, ${n.added}`);
    }

    // ============ INDEXEDDB ============
    const DB_NAME = 'ProductsDB_v2';
    const DB_VERSION = 1;
    let db = null;

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => reject(request.error);
            request.onsuccess = () => resolve(request.result);
            request.onupgradeneeded = (event) => {
                const database = event.target.result;
                if (!database.objectStoreNames.contains('products')) {
                    const store = database.createObjectStore('products', { keyPath: 'localId' });
                    store.createIndex('user_id', 'user_id', { unique: false });
                    store.createIndex('syncStatus', 'syncStatus', { unique: false });
                    store.createIndex('serverId', 'serverId', { unique: false });
                }
                if (!database.objectStoreNames.contains('session')) {
                    database.createObjectStore('session', { keyPath: 'key' });
                }
            };
        });
    }

    async function saveToLocal(storeName, data) {
        if (!db) db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.put(data);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function getAllFromLocal(storeName, indexName, value) {
        if (!db) db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            let request;
            if (indexName && value !== undefined) {
                request = store.index(indexName).getAll(value);
            } else {
                request = store.getAll();
            }
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteFromLocal(storeName, key) {
        if (!db) db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.delete(key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function clearLocalStore(storeName) {
        if (!db) db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.clear();
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    // ============ СЕССИЯ ============
    async function saveSession(user) {
        await saveToLocal('session', { key: 'currentUser', data: user });
    }

    async function getSession() {
        const sessions = await getAllFromLocal('session');
        const session = sessions.find(s => s.key === 'currentUser');
        return session ? session.data : null;
    }

    async function clearSession() {
        await deleteFromLocal('session', 'currentUser');
    }

    // ============ СЕТЬ ============
    let isOnline = navigator.onLine;
    let syncInProgress = false;

    function updateOnlineStatus() {
        isOnline = navigator.onLine;
        const banner = document.getElementById('offlineBanner');
        const syncBtn = document.getElementById('syncBtn');
        if (!isOnline) {
            banner.classList.remove('hidden');
            syncBtn.textContent = '🔄 Нет интернета';
            syncBtn.disabled = true;
        } else {
            banner.classList.add('hidden');
            syncBtn.textContent = '🔄 Синхронизировать';
            syncBtn.disabled = false;
        }
    }

    window.addEventListener('online', () => {
        updateOnlineStatus();
        if (currentUser) {
            loadProducts();
        }
    });
    window.addEventListener('offline', updateOnlineStatus);

    function updateSyncStatus(text, type) {
        const el = document.getElementById('syncStatus');
        el.textContent = text;
        el.className = 'sync-status ' + (type || '');
    }

    // ============ СИНХРОНИЗАЦИЯ ============
    async function syncToServer() {
        if (!isOnline || syncInProgress || !currentUser) return;
        
        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        const pendingProducts = localProducts.filter(p => p.syncStatus === 'pending');

        if (pendingProducts.length === 0) {
            updateSyncStatus('Все данные синхронизированы ✅', 'success');
            return;
        }

        syncInProgress = true;
        updateSyncStatus(`Синхронизация ${pendingProducts.length} записей...`, 'syncing');

        for (const product of pendingProducts) {
            try {
                if (product._pendingDelete) {
                    if (product.serverId) {
                        await supabase.from('products').delete().eq('id', product.serverId).eq('user_id', currentUser.id);
                    }
                    await deleteFromLocal('products', product.localId);
                    continue;
                }

                if (product.serverId) {
                    const { error } = await supabase.from('products').update({
                        numbers: product.numbers,
                        last_update: new Date().toISOString(),
                        is_active: product.is_active
                    }).eq('id', product.serverId);
                    if (error) throw error;
                    product.syncStatus = 'synced';
                    await saveToLocal('products', product);
                } else {
                    const { data, error } = await supabase.from('products').insert({
                        user_id: currentUser.id,
                        name: product.name,
                        numbers: product.numbers,
                        last_update: new Date().toISOString(),
                        is_active: product.is_active !== false
                    }).select();
                    if (error) throw error;
                    if (data && data[0]) {
                        product.serverId = data[0].id;
                        product.syncStatus = 'synced';
                        await saveToLocal('products', product);
                    }
                }
            } catch (err) {
                console.error('Sync error:', err);
                product.syncStatus = 'error';
                await saveToLocal('products', product);
            }
        }

        syncInProgress = false;
        const remaining = (await getAllFromLocal('products', 'user_id', currentUser.id)).filter(p => p.syncStatus === 'pending').length;
        
        if (remaining === 0) {
            updateSyncStatus('Все данные синхронизированы ✅', 'success');
        } else {
            updateSyncStatus(`Ошибка синхронизации: ${remaining} записей`, 'error');
        }

        await loadProductsFromLocal();
    }

    window.forceSync = async function() {
        if (!isOnline) {
            alert('Нет подключения к интернету');
            return;
        }
        await syncToServer();
    };

    // ============ ОСНОВНАЯ ЛОГИКА ============
    let currentUser = null;
    let products = [];
    let currentProductId = null;
    let isLoginMode = true;

    const productInput = document.getElementById('productInput');
    const suggestionsBox = document.getElementById('suggestionsBox');

    async function init() {
        updateOnlineStatus();
        const localUser = await getSession();
        
        try {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                currentUser = user;
                await saveSession(user);
                showMainScreen();
                await loadProducts();
            } else if (localUser && !isOnline) {
                currentUser = localUser;
                showMainScreen();
                await loadProductsFromLocal();
            } else {
                showAuthScreen();
            }
        } catch (err) {
            if (localUser) {
                currentUser = localUser;
                showMainScreen();
                await loadProductsFromLocal();
            } else {
                showAuthScreen();
            }
        }
        document.getElementById('loadingScreen').classList.add('hidden');
    }

    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN') {
            currentUser = session.user;
            saveSession(session.user);
            showMainScreen();
            loadProducts();
        } else if (event === 'SIGNED_OUT') {
            currentUser = null;
            products = [];
            showAuthScreen();
        }
    });

    function showAuthScreen() {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('summaryScreen').classList.add('hidden');
        document.getElementById('loadingScreen').classList.add('hidden');
    }

    function showMainScreen() {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('summaryScreen').classList.add('hidden');
        document.getElementById('userEmail').textContent = currentUser.email;
        updateOnlineStatus();
    }

    async function loadProducts() {
        if (isOnline) {
            try {
                await loadProductsFromServer();
            } catch (err) {
                console.error('Server load failed:', err);
                await loadProductsFromLocal();
            }
        } else {
            await loadProductsFromLocal();
        }
    }

    async function loadProductsFromServer() {
        const { data, error } = await supabase
            .from('products')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('is_active', { ascending: false })
            .order('last_update', { ascending: false });

        if (error) throw error;

        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);

        for (const item of (data || [])) {
            // Убедимся, что numbers – массив объектов {value, added} (может прийти как массив строк при первой миграции)
            let numbers = item.numbers || [];
            // Преобразуем старые строки в объекты без даты (добавим текущую дату как заглушку)
            numbers = numbers.map(n => {
                if (typeof n === 'string') return { value: n, added: new Date().toLocaleDateString('ru-RU') };
                return n;
            });

            const local = localProducts.find(p => p.serverId === item.id);
            if (local) {
                if (local.syncStatus === 'synced' && !local._pendingDelete) {
                    local.name = item.name;
                    local.numbers = numbers;
                    local.is_active = item.is_active !== false;
                    local.last_update = item.last_update || item.created_at;
                    local.created_at = item.created_at;
                    await saveToLocal('products', local);
                }
            } else {
                await saveToLocal('products', {
                    localId: generateId(),
                    serverId: item.id,
                    user_id: item.user_id,
                    name: item.name,
                    numbers: numbers,
                    is_active: item.is_active !== false,
                    last_update: item.last_update || item.created_at,
                    created_at: item.created_at,
                    syncStatus: 'synced'
                });
            }
        }

        const serverIds = new Set((data || []).map(d => d.id));
        for (const local of localProducts) {
            if (local.serverId && local.syncStatus === 'synced' && !serverIds.has(local.serverId)) {
                await deleteFromLocal('products', local.localId);
            }
        }

        await loadProductsFromLocal();
    }

    async function loadProductsFromLocal() {
        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        products = localProducts
            .sort((a, b) => {
                if (a.is_active !== b.is_active) return (b.is_active ? 1 : 0) - (a.is_active ? 1 : 0);
                return new Date(b.last_update || 0) - new Date(a.last_update || 0);
            })
            .map(p => ({
                id: p.localId,
                serverId: p.serverId,
                name: p.name,
                numbers: p.numbers || [],
                is_active: p.is_active !== false,
                last_update: p.last_update,
                created_at: p.created_at,
                syncStatus: p.syncStatus
            }));
        
        renderProducts();
        const pendingCount = localProducts.filter(p => p.syncStatus === 'pending').length;
        if (pendingCount > 0) {
            updateSyncStatus(`Ожидает синхронизации: ${pendingCount} записей`, 'error');
        } else {
            updateSyncStatus(isOnline ? 'Все данные синхронизированы ✅' : 'Работа в офлайн-режиме', isOnline ? 'success' : '');
        }
    }

    window.toggleAuthMode = function () {
        isLoginMode = !isLoginMode;
        const title = document.getElementById('authTitle');
        const btn = document.getElementById('authSubmitBtn');
        const toggleText = document.getElementById('authToggleText');
        if (isLoginMode) {
            title.textContent = 'Вход';
            btn.textContent = 'Войти';
            toggleText.textContent = 'Нет аккаунта?';
        } else {
            title.textContent = 'Регистрация';
            btn.textContent = 'Зарегистрироваться';
            toggleText.textContent = 'Уже есть аккаунт?';
        }
        document.getElementById('authError').innerHTML = '';
        document.getElementById('authSuccess').innerHTML = '';
    };

    window.handleAuth = async function () {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const errorDiv = document.getElementById('authError');
        const successDiv = document.getElementById('authSuccess');
        errorDiv.innerHTML = '';
        successDiv.innerHTML = '';
        if (!email || !password) {
            errorDiv.innerHTML = '<div class="error-message">Заполните все поля</div>';
            return;
        }
        const btn = document.getElementById('authSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Загрузка...';
        try {
            if (isLoginMode) {
                const { error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } else {
                const { error } = await supabase.auth.signUp({ email, password });
                if (error) throw error;
                successDiv.innerHTML = '<div class="success-message">Регистрация успешна! Проверьте email для подтверждения.</div>';
            }
        } catch (error) {
            errorDiv.innerHTML = `<div class="error-message">${error.message}</div>`;
            btn.disabled = false;
            btn.textContent = isLoginMode ? 'Войти' : 'Зарегистрироваться';
        }
    };

    window.handleLogout = async function () {
        await clearSession();
        await clearLocalStore('products');
        await supabase.auth.signOut();
        currentUser = null;
        products = [];
    };

    window.addProduct = async function () {
        const input = document.getElementById('productInput');
        const name = input.value.trim().toUpperCase(); 
        if (!name) return;

        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        const existingActive = localProducts.find(p => p.is_active && p.name.toLowerCase() === name.toLowerCase());

        if (existingActive) {
            existingActive.is_active = false;
            existingActive.last_update = new Date().toISOString();
            existingActive.syncStatus = 'pending';
            await saveToLocal('products', existingActive);
        }

        const newProduct = {
            localId: generateId(),
            user_id: currentUser.id,
            name: name,
            numbers: [], // теперь массив объектов
            last_update: new Date().toISOString(),
            is_active: true,
            syncStatus: 'pending',
            serverId: null,
            created_at: new Date().toISOString()
        };
        
        await saveToLocal('products', newProduct);
        
        input.value = '';
        closeSuggestions();
        await loadProductsFromLocal();
        
        if (isOnline) {
            syncToServer();
        }
    };

    function renderProducts() {
        const list = document.getElementById('productsList');
        const empty = document.getElementById('emptyState');
        if (products.length === 0) {
            list.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }
        
        list.innerHTML = products.map(p => {
            const isArchived = !p.is_active;
            const archiveClass = isArchived ? 'archived' : '';
            const archiveBadge = isArchived ? '<span class="archive-badge">АРХИВ</span>' : '';
            const pendingBadge = p.syncStatus === 'pending' ? '<span class="pending-badge">⟳</span>' : '';
            const clickAction = isArchived ? '' : `onclick="openModal('${p.id}')"`;
            const cursorStyle = isArchived ? 'cursor: default;' : '';

            return `
            <div class="product-item ${archiveClass}" ${clickAction} style="${cursorStyle}">
                <div class="product-name">
                    ${p.name}
                    ${archiveBadge}
                    ${pendingBadge}
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="product-count">${(p.numbers || []).length} шт</div>
                    <button class="delete-product-btn" onclick="deleteProduct(event, '${p.id}')">🗑️</button>
                </div>
            </div>
            `;
        }).join('');

        empty.classList.add('hidden');
    }

    productInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();
        if (query.length === 0) {
            closeSuggestions();
            return;
        }
        const filtered = products.filter(p => p.is_active && p.name.toLowerCase().includes(query));
        renderSuggestions(filtered);
    });

    document.addEventListener('click', (e) => {
        if (!productInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
            closeSuggestions();
        }
    });

    function renderSuggestions(items) {
        suggestionsBox.innerHTML = '';
        if (items.length === 0) {
            suggestionsBox.style.display = 'none';
            return;
        }

        items.forEach(p => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerHTML = `
                <span style="font-weight:600; color:#1e293b;">${p.name}</span>
                <span class="suggestion-meta">${(p.numbers || []).length} шт (Сейчас)</span>
            `;
            div.onclick = (e) => {
                e.stopPropagation();
                openModal(p.id);
                productInput.value = '';
                closeSuggestions();
            };
            suggestionsBox.appendChild(div);
        });

        suggestionsBox.style.display = 'block';
    }

    function closeSuggestions() {
        suggestionsBox.style.display = 'none';
    }

    window.openModal = function (productId) {
        const product = products.find(p => p.id === productId);
        if (!product || !product.is_active) return;

        currentProductId = productId;
        document.getElementById('modalTitle').textContent = product.name;
        document.getElementById('modal').style.display = 'block';
        renderNumbers();
    };

    window.closeModal = function () {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('numberInput').value = '';
        currentProductId = null;
    };

    window.addNumber = async function () {
        const input = document.getElementById('numberInput');
        const value = input.value.trim();
        if (!value || !currentProductId) return;
        
        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        const localProduct = localProducts.find(p => p.localId === currentProductId);
        if (!localProduct) return;
        
        const newNumbers = parseNumbers(value);
        const now = new Date().toLocaleDateString('ru-RU'); // ДД.ММ.ГГ
        const newNumbersWithDate = newNumbers.map(num => ({ value: num, added: now }));
        
        localProduct.numbers = [...(localProduct.numbers || []), ...newNumbersWithDate];
        localProduct.last_update = new Date().toISOString();
        localProduct.syncStatus = 'pending';
        await saveToLocal('products', localProduct);

        input.value = '';
        await loadProductsFromLocal();
        renderNumbers();
        
        if (isOnline) {
            syncToServer();
        }
    };

    function parseNumbers(input) {
        const numbers = [];
        const parts = input.split(',').map(s => s.trim());
        parts.forEach(part => {
            if (part.includes('-')) {
                const [start, end] = part.split('-').map(s => parseInt(s.trim()));
                if (!isNaN(start) && !isNaN(end) && start <= end) {
                    for (let i = start; i <= end; i++) numbers.push(i.toString());
                }
            } else if (part) {
                numbers.push(part);
            }
        });
        return numbers;
    }

    window.removeNumber = async function (numIndex) {
        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        const localProduct = localProducts.find(p => p.localId === currentProductId);
        if (!localProduct) return;
        
        localProduct.numbers = (localProduct.numbers || []).filter((_, i) => i !== numIndex);
        localProduct.last_update = new Date().toISOString();
        localProduct.syncStatus = 'pending';
        await saveToLocal('products', localProduct);
        
        await loadProductsFromLocal();
        renderNumbers();
        
        if (isOnline) {
            syncToServer();
        }
    };

    window.deleteProduct = async function (event, productId) {
        event.stopPropagation();
        if (!confirm('❓ Точно удалить изделие?')) return;
        
        const localProducts = await getAllFromLocal('products', 'user_id', currentUser.id);
        const localProduct = localProducts.find(p => p.localId === productId);
        if (!localProduct) return;
        
        if (localProduct.serverId) {
            localProduct._pendingDelete = true;
            localProduct.syncStatus = 'pending';
            await saveToLocal('products', localProduct);
        } else {
            await deleteFromLocal('products', productId);
        }
        
        await loadProductsFromLocal();
        
        if (isOnline) {
            syncToServer();
        }
    };

    function renderNumbers() {
        const list = document.getElementById('numbersList');
        const product = products.find(p => p.id === currentProductId);
        if (!product || !(product.numbers || []).length) {
            list.innerHTML = '<p style="color: #94a3b8; text-align: center; width: 100%;">Номера не добавлены</p>';
            return;
        }
        list.innerHTML = product.numbers.map((n, i) => `
            <div class="number-tag">
                <div>
                    <span style="font-weight:600;">${n.value}</span>
                    <br><small style="color: #64748b; font-size: 11px;">${n.added || '—'}</small>
                </div>
                <button class="remove-number" onclick="removeNumber(${i})">×</button>
            </div>
        `).join('');
    }

    window.showSummaryScreen = async function () {
        const summary = {};
        products.forEach(p => {
            const status = p.is_active ? 'Активный' : 'Архив';
            const syncStatus = p.syncStatus === 'pending' ? ' (не синхронизирован)' : '';
            
            if (!summary[p.name]) summary[p.name] = [];
            
            summary[p.name].push({
                status: status + syncStatus,
                created: new Date(p.created_at || Date.now()).toLocaleString('ru-RU'),
                count: (p.numbers || []).length,
                numbers: formatNumbersWithDate(p.numbers) // используем новую функцию
            });
        });

        document.getElementById('jsonOutput').textContent = JSON.stringify(summary, null, 2);
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('summaryScreen').classList.remove('hidden');
    };

    window.backToMain = function () {
        document.getElementById('summaryScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
    };

    window.downloadJSON = function () {
        const summary = {};
        products.forEach(p => {
            const status = p.is_active ? 'Активный' : 'Архив';
            if (!summary[p.name]) summary[p.name] = [];
            summary[p.name].push({
                status: status,
                created: new Date(p.created_at || Date.now()).toLocaleString('ru-RU'),
                count: (p.numbers || []).length,
                numbers: formatNumbersWithDate(p.numbers)
            });
        });

        const blob = new Blob([JSON.stringify(summary, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `summary_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
    };

    document.getElementById('productInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addProduct();
    });

    document.getElementById('numberInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addNumber();
    });

    document.getElementById('authEmail')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleAuth();
    });

    document.getElementById('authPassword')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleAuth();
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
    }

    init();
</script>
